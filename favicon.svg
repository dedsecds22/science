<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#4f90ff"/>
  
  <!-- Light bulb for science -->
  <g transform="translate(32, 32)">
    <!-- Bulb circle -->
    <circle cx="0" cy="-6" r="12" fill="none" stroke="white" stroke-width="2"/>
    
    <!-- Filament -->
    <path d="M 0 -14 Q -4 -10 0 -8 Q 4 -6 0 -2" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Base/socket -->
    <rect x="-6" y="6" width="12" height="4" fill="white" rx="1"/>
    <rect x="-6" y="12" width="12" height="2" fill="white" rx="1"/>
    <line x1="-4" y1="14" x2="-4" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="14" x2="4" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
