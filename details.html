<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tudós Részletei</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <div class="container content-wrapper">
        <!-- Navigation -->
        <div class="page-header">
            <nav style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%;">
                <a href="index.html" class="nav-btn">Tudósok</a>
                <a href="pdf.html" class="nav-btn">Tudományos ismeretterjesztés</a>
            </nav>
        </div>

        <!-- Details Container -->
        <div id="detailsContainer" style="
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            max-width: 700px;
            margin: 3rem auto;
            box-shadow: var(--shadow-lg);
        ">
            <!-- Details will be inserted here -->
        </div>
    </div>

    <script src="tudosok.js"></script>

    <script>
        function loadDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (!id) {
                document.getElementById('detailsContainer').innerHTML = '<p style="text-align: center; color: var(--text-muted);">Nincs kiválasztott tudós.</p>';
                return;
            }

            const tudos = tudosok.find(t => t._id.$oid === id);
            if (!tudos) {
                document.getElementById('detailsContainer').innerHTML = '<p style="text-align: center; color: var(--text-muted);">Tudós nem található.</p>';
                return;
            }

            // Clean data
            const cleanTudos = {
                nev: tudos.nev,
                szakterulet: tudos.szakterulet,
                orszag: tudos.orszag,
                felfedezesek: tudos.felfedezesek,
                publikaciok: tudos.publikaciok,
                szuletesiDatum: tudos.szuletesiDatum ? new Date(parseInt(tudos.szuletesiDatum.$date.$numberLong)).toLocaleDateString('hu-HU') : 'Ismeretlen',
                halalozasiDatum: tudos.halalozasiDatum ? new Date(parseInt(tudos.halalozasiDatum.$date.$numberLong)).toLocaleDateString('hu-HU') : 'Él',
                kep: tudos.kep
            };

            const container = document.getElementById('detailsContainer');
            container.innerHTML = `
                <div style="text-align: center; margin-bottom: 2rem;">
                    <img src="uploads/${cleanTudos.kep}" alt="${cleanTudos.nev}" style="
                        max-width: 100%;
                        max-height: 300px;
                        border-radius: var(--radius-lg);
                        box-shadow: var(--shadow-md);
                        object-fit: cover;
                    ">
                </div>
                
                <h2 style="text-align: center; margin-bottom: 1.5rem;">${cleanTudos.nev}</h2>
                
                <div style="
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 1rem;
                    margin-bottom: 2rem;
                ">
                    <div style="
                        background: rgba(255, 255, 255, 0.05);
                        padding: 1rem;
                        border-radius: var(--radius-md);
                        border-left: 3px solid var(--primary-color);
                    ">
                        <strong>Szakterület:</strong>
                        <p style="margin: 0.5rem 0 0 0;">${cleanTudos.szakterulet}</p>
                    </div>
                    <div style="
                        background: rgba(255, 255, 255, 0.05);
                        padding: 1rem;
                        border-radius: var(--radius-md);
                        border-left: 3px solid var(--secondary-color);
                    ">
                        <strong>Ország:</strong>
                        <p style="margin: 0.5rem 0 0 0;">${cleanTudos.orszag}</p>
                    </div>
                    <div style="
                        background: rgba(255, 255, 255, 0.05);
                        padding: 1rem;
                        border-radius: var(--radius-md);
                        border-left: 3px solid var(--success-color);
                    ">
                        <strong>Születési dátum:</strong>
                        <p style="margin: 0.5rem 0 0 0;">${cleanTudos.szuletesiDatum}</p>
                    </div>
                    <div style="
                        background: rgba(255, 255, 255, 0.05);
                        padding: 1rem;
                        border-radius: var(--radius-md);
                        border-left: 3px solid var(--warning-color);
                    ">
                        <strong>Halálozási dátum:</strong>
                        <p style="margin: 0.5rem 0 0 0;">${cleanTudos.halalozasiDatum}</p>
                    </div>
                </div>
                
                <h3 style="margin-top: 2rem; margin-bottom: 1rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem;">Felfedezések</h3>
                <ul class="list-group" style="margin-bottom: 2rem;">
                    ${cleanTudos.felfedezesek.map(f => `<li class="list-group-item">${f}</li>`).join('')}
                </ul>
                
                <h3 style="margin-top: 2rem; margin-bottom: 1rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem;">Publikációk</h3>
                <ul class="list-group" style="margin-bottom: 2rem;">
                    ${cleanTudos.publikaciok.map(p => `<li class="list-group-item">${p}</li>`).join('')}
                </ul>
                
                <a href="index.html" class="btn btn-secondary" style="width: 100%; margin-top: 1.5rem;">← Vissza a listához</a>
            `;
        }

        loadDetails();
    </script>
</body>
</html>
